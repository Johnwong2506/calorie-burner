<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | Calorie Burner</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <header id="siteHeader"></header>
  <main class="auth-page">
    <div class="container auth-layout">
      <section class="auth-side card-glass">
        <span class="pill">Welcome back</span>
        <h1>Đăng nhập để lưu tiến trình tập luyện</h1>
        <p>Lưu thông tin người dùng, lịch tập cá nhân và danh sách yêu thích hoàn toàn ở localStorage.</p>
      </section>
      <section class="auth-card card-glass">
        <h2>Đăng nhập</h2>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" required placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" required placeholder="Nhập mật khẩu" />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
        </form>
        <p class="auth-note">Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a></p>
        <div id="authMessage"></div>
      </section>
    </div>
  </main>
  <footer id="siteFooter"></footer>
  <div id="toast" class="toast"></div>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/pages/login.js"></script>
</body>
</html>
