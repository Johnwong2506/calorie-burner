<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bữa ăn | Calorie Burner</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/listing.css" />
</head>
<body>
  <header id="siteHeader"></header>
  <main class="page-wrap">
    <section class="page-hero">
      <div class="container">
        <p class="section-kicker">Healthy meals</p>
        <h1>Gợi ý bữa ăn</h1>
        <p class="page-description">Tìm món ăn theo nguyên liệu phù hợp cho chế độ ăn lành mạnh và hỗ trợ giảm cân.</p>
      </div>
    </section>
    <section class="container">
      <div class="toolbar two-cols">
        <input id="mealSearch" type="text" placeholder="Tìm theo nguyên liệu, ví dụ chicken_breast hoặc salmon..." />
        <button id="mealSearchBtn" class="btn btn-primary">Tìm món</button>
      </div>
      <div id="mealLoading"></div>
      <div id="mealList" class="meal-grid"></div>
      <div id="mealEmpty"></div>
    </section>
  </main>
  <footer id="siteFooter"></footer>
  <div id="toast" class="toast"></div>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/pages/meals.js"></script>
</body>
</html>
