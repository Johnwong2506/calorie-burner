<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký | Calorie Burner</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <header id="siteHeader"></header>
  <main class="auth-page">
    <div class="container auth-layout">
      <section class="auth-side card-glass">
        <span class="pill">Get started</span>
        <h1>Tạo tài khoản và xây dựng lộ trình đốt calo của bạn</h1>
        <p>Flow đăng ký đơn giản, dễ hiểu, phù hợp đồ án học viên frontend.</p>
      </section>
      <section class="auth-card card-glass">
        <h2>Đăng ký</h2>
        <form id="registerForm" class="auth-form">
          <div class="form-group"><label for="name">Họ tên</label><input id="name" type="text" required placeholder="Nguyễn Văn A" /></div>
          <div class="form-group"><label for="email">Email</label><input id="email" type="email" required placeholder="you@example.com" /></div>
          <div class="form-group"><label for="password">Mật khẩu</label><input id="password" type="password" minlength="6" required placeholder="Tối thiểu 6 ký tự" /></div>
          <div class="form-group"><label for="confirmPassword">Xác nhận mật khẩu</label><input id="confirmPassword" type="password" required placeholder="Nhập lại mật khẩu" /></div>
          <button type="submit" class="btn btn-primary btn-block">Tạo tài khoản</button>
        </form>
        <p class="auth-note">Đã có tài khoản? <a href="./login.html">Đăng nhập</a></p>
        <div id="authMessage"></div>
      </section>
    </div>
  </main>
  <footer id="siteFooter"></footer>
  <div id="toast" class="toast"></div>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/pages/register.js"></script>
</body>
</html>
